<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spel 1 - Muziekcode</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(0,20,50,.75),rgba(0,20,50,.88)),
        radial-gradient(circle at top,#1e90ff,#07152e 65%);
      display:flex; align-items:center; justify-content:center;
      padding:20px; overflow-x:hidden;
    }
    .stadium-lines{position:fixed;inset:0;pointer-events:none;background:
      linear-gradient(90deg,transparent 48%,rgba(255,255,255,.08) 49%,rgba(255,255,255,.08) 51%,transparent 52%),
      linear-gradient(0deg,transparent 48%,rgba(255,255,255,.05) 49%,rgba(255,255,255,.05) 51%,transparent 52%);
      background-size:90px 90px;opacity:.55;}
    .card{position:relative;width:100%;max-width:680px;background:rgba(5,20,45,.9);
      border:2px solid rgba(255,255,255,.22);border-radius:28px;padding:28px;text-align:center;
      box-shadow:0 25px 70px rgba(0,0,0,.45);z-index:2;}
    .badge{display:inline-block;background:white;color:#073763;padding:8px 16px;border-radius:999px;font-weight:800;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;}
    h1{margin:8px 0 10px;font-size:clamp(2rem,7vw,3.4rem);line-height:1;}
    .subtitle{font-size:1.1rem;line-height:1.5;opacity:.95;margin:0 auto 22px;max-width:560px;}
    .audio-box{background:rgba(255,255,255,.1);border-radius:20px;padding:18px;margin:22px 0;border:1px solid rgba(255,255,255,.18);}
    audio{width:100%;margin-top:10px;}
    .hint{font-size:.95rem;opacity:.85;margin-top:8px;}
    input{width:100%;max-width:300px;text-align:center;font-size:2rem;font-weight:900;letter-spacing:8px;padding:16px;border-radius:18px;border:3px solid transparent;outline:none;margin:12px 0;text-transform:uppercase;}
    input:focus{border-color:#ffe066;box-shadow:0 0 0 4px rgba(255,224,102,.2);}
    button{border:none;border-radius:999px;padding:15px 28px;font-size:1.05rem;font-weight:900;cursor:pointer;background:#ffe066;color:#07152e;box-shadow:0 8px 0 #d5ad00;margin-top:8px;}
    .message{min-height:70px;margin-top:24px;font-size:1.25rem;font-weight:800;}
    .wrong{color:#ff4d4d;animation:shake .35s ease;font-size:1.35rem;}
    .correct{color:#7CFF6B;animation:pop .45s ease;}
    .big-letter{display:none;margin:18px auto 0;width:150px;height:150px;border-radius:50%;background:white;color:#073763;align-items:center;justify-content:center;font-size:6rem;font-weight:1000;box-shadow:0 0 40px rgba(255,255,255,.6);animation:pop .55s ease;}
    .big-letter.show{display:flex;}
    .confetti{position:fixed;top:-20px;width:12px;height:18px;opacity:.95;z-index:20;animation:fall 2.5s linear forwards;}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}50%{transform:translateX(8px);}75%{transform:translateX(-5px);}}
    @keyframes pop{0%{transform:scale(.4);opacity:0;}80%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
    .footer{margin-top:22px;font-size:.85rem;opacity:.65;}
  </style>
</head>
<body>
<div class="stadium-lines"></div>
<main class="card">
<div class="badge">Spel 1</div>
<h1>Muziekcode</h1>
<p class="subtitle">Luister naar het muziekfragment. Haal de juiste letters uit de meisjesnamen en voer de code van 5 letters in.</p>
<section class="audio-box">
<strong>🎧 Muziekfragment</strong>
<audio controls preload="metadata">
<source src="muziek.mp3" type="audio/mpeg">
</audio>
<div class="hint">Je mag het fragment zo vaak luisteren als je wilt.</div>
</section>

<form id="codeForm" autocomplete="off">
<label for="codeInput"><strong>Voer de 5-lettercode in:</strong></label><br>
<input id="codeInput" name="spel1code" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="-----">
<br><button type="submit">Controleer code</button>
</form>

<div id="message" class="message"></div>
<div id="bigLetter" class="big-letter">S</div>
<div class="footer">Onbeperkt proberen toegestaan</div>
</main>

<script>
const CORRECT_CODE="VAREN",REWARD_LETTER="S";
const form=document.getElementById("codeForm");
const input=document.getElementById("codeInput");
const message=document.getElementById("message");
const bigLetter=document.getElementById("bigLetter");
window.addEventListener("pageshow",()=>{form.reset();input.value="";});
input.addEventListener("input",()=>{input.value=input.value.replace(/[^a-zA-Z]/g,"").toUpperCase();});
form.addEventListener("submit",(e)=>{
e.preventDefault();
const answer=input.value.trim().toUpperCase();
message.className="message";
bigLetter.classList.remove("show");
if(answer===CORRECT_CODE){
message.innerHTML="🎉 Goed gedaan! Jullie verdiende letter is:";
message.classList.add("correct");
bigLetter.textContent=REWARD_LETTER;
bigLetter.classList.add("show");
}else{
message.innerHTML="❌ Helaas, dat is niet juist. Probeer opnieuw.";
message.classList.add("wrong");
input.select();
}});
</script>
</body>
</html>
