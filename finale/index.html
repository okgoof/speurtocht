<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finale</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(rgba(0,20,50,.75),rgba(0,20,50,.88)),radial-gradient(circle at top,#1e90ff,#07152e 65%);color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{max-width:760px;width:92%;background:rgba(5,20,45,.9);padding:30px;border-radius:28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.badge{display:inline-block;background:#fff;color:#073763;padding:8px 16px;border-radius:999px;font-weight:bold}
input{margin-top:15px;font-size:2rem;letter-spacing:6px;text-transform:uppercase;text-align:center;padding:15px;border-radius:15px;border:none;width:320px;max-width:90%}
button{margin-top:15px;padding:15px 28px;border:none;border-radius:999px;background:#ffe066;font-weight:bold;font-size:1rem;cursor:pointer}
#msg{min-height:50px;margin-top:20px;font-weight:bold}
#cross{display:none;color:#ff4d4d;font-size:70px}
#result{display:none;margin-top:20px}
#result img{max-width:100%;border-radius:18px}
.confetti{position:fixed;top:-20px;width:10px;height:16px;animation:fall 2.8s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="card">
<div class="badge">Finale</div>
<h1>🏆 Finale</h1>

<p><strong>Verzamel bij elk kruis op je kaart de benodigde code.</strong></p>

<p><strong>Voer deze hieronder op alfabetische volgorde in</strong><br>
om te onthullen waar jullie prijs zich bevindt.</p>

<audio id="cheer" src="cheer.wav"></audio>

<input id="code" maxlength="5" placeholder="-----"><br>
<button onclick="check()">Open finale</button>

<div id="msg"></div>
<div id="cross">✖</div>

<div id="result">
<img src="eind.png" alt="Prijs">
</div>

<script>
const GOED="BGST!";
function confetti(){const c=['#fff','#ffe066','#4dabf7','#7cff6b','#ff6b6b'];for(let i=0;i<120;i++){let d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'vw';d.style.background=c[Math.floor(Math.random()*c.length)];document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}}
function fallback(){const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=650;g.gain.value=.05;o.start();o.stop(a.currentTime+.3);}
function check(){let v=document.getElementById('code').value.toUpperCase();let m=document.getElementById('msg');let x=document.getElementById('cross');let r=document.getElementById('result');x.style.display='none';r.style.display='none';if(v===GOED){m.innerHTML='🎉 Gefeliciteerd! Hier bevindt zich jullie prijs!';m.style.color='#7CFF6B';confetti();let ch=document.getElementById('cheer');ch.currentTime=0;ch.play().catch(fallback);r.style.display='block';}else{m.innerHTML='Onjuiste code. Probeer opnieuw.';m.style.color='#ff4d4d';x.style.display='block';}}
</script>
</div>
</body>
</html>
