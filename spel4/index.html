<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spel 4 - Morsecode</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(0, 20, 50, 0.75), rgba(0, 20, 50, 0.88)),
        radial-gradient(circle at top, #1e90ff, #07152e 65%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .stadium-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 48%, rgba(255,255,255,0.08) 49%, rgba(255,255,255,0.08) 51%, transparent 52%),
        linear-gradient(0deg, transparent 48%, rgba(255,255,255,0.05) 49%, rgba(255,255,255,0.05) 51%, transparent 52%);
      background-size: 90px 90px;
      opacity: 0.55;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 680px;
      background: rgba(5, 20, 45, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
      z-index: 2;
    }

    .badge {
      display: inline-block;
      background: white;
      color: #073763;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 10px;
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1;
    }

    .subtitle {
      font-size: 1.1rem;
      line-height: 1.5;
      opacity: 0.95;
      margin: 0 auto 22px;
      max-width: 560px;
    }

    .audio-box {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 18px;
      margin: 22px 0;
      border: 1px solid rgba(255,255,255,0.18);
    }

    audio {
      width: 100%;
      margin-top: 12px;
    }

    .hint {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-top: 10px;
    }

    .footer {
      margin-top: 22px;
      font-size: 0.85rem;
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <div class="stadium-lines"></div>

  <main class="card">
    <div class="badge">Spel 4</div>
    <h1>📡 Morsecode</h1>

    <p class="subtitle">
      Luister goed naar het fragment. Je mag de morsecode zo vaak afspelen als nodig is.
    </p>

    <section class="audio-box">
      <strong>🎧 Morsefragment</strong>
      <audio controls preload="metadata">
        <source src="morse.mp3" type="audio/mpeg">
        Je browser ondersteunt geen audio.
      </audio>
      <div class="hint">Zet je volume aan en luister eventueel meerdere keren.</div>
    </section>

    <div class="footer">Geen invoer nodig op deze pagina</div>
  </main>
</body>
</html>
